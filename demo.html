<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Fake News Engine</title>

<style>
body{background:#020617;color:white;font-family:sans-serif;padding:30px;}
.card{background:#0f172a;padding:20px;border-radius:16px;margin-bottom:20px;}
textarea{width:100%;height:120px;}
button{width:100%;padding:12px;margin-top:10px;}
.real{color:#22c55e;}
.fake{color:#ef4444;}
.uncertain{color:#facc15;}
canvas{width:100%;}
</style>
</head>

<body>

<div class="card">
<h2>Fake News Detection Engine</h2>
<textarea id="input"></textarea>
<button onclick="run()">Analyze</button>
</div>

<div class="card" id="result"></div>

<div class="card">
<h3>Metrics</h3>
<p>Accuracy: <span id="acc"></span></p>
<p>Loss: <span id="loss"></span></p>
<p>Dataset: <span id="size"></span></p>
</div>

<div class="card">
<h3>Confusion Matrix</h3>
<p>TP: <span id="tp"></span> | FP: <span id="fp"></span></p>
<p>TN: <span id="tn"></span> | FN: <span id="fn"></span></p>
</div>

<div class="card">
<h3>Training Graph</h3>
<canvas id="graph" height="150"></canvas>
</div>

<script src="model.js"></script>

<script>

function run(){
    let t=document.getElementById("input").value;
    let r=analyzeText(t);

    let cls=r.verdict==="REAL"?"real":r.verdict==="FAKE"?"fake":"uncertain";

    document.getElementById("result").innerHTML=`
    <h2 class="${cls}">${r.verdict}</h2>
    <p>Confidence: ${r.confidence}%</p>
    <p>Score: ${r.score.toFixed(3)}</p>`;
}

// metrics
document.getElementById("acc").innerText=(accuracy*100).toFixed(1)+"%";
document.getElementById("loss").innerText=loss.toFixed(4);
document.getElementById("size").innerText=dataset.length;

document.getElementById("tp").innerText=TP;
document.getElementById("fp").innerText=FP;
document.getElementById("tn").innerText=TN;
document.getElementById("fn").innerText=FN;

// graph
const ctx=document.getElementById("graph").getContext("2d");

ctx.beginPath();
history.forEach((l,i)=>{
    let x=i*(300/history.length);
    let y=150-l*100;
    if(i===0) ctx.moveTo(x,y);
    else ctx.lineTo(x,y);
});
ctx.strokeStyle="#3b82f6";
ctx.stroke();

</script>

</body>
</html>
